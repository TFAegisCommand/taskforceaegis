<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Force Aegis | Operations Terminal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Rajdhani:wght@500;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

    <div id="splash-screen" class="active-screen">
        <div class="logo-3d-wrapper"><img src="logo-512.png" id="spinning-logo"></div>
        <h1 class="splash-title">TASK FORCE AEGIS</h1>
        <button id="initiate-btn" class="tactical-btn delayed-fade">INITIATE UPLINK</button>
    </div>

    <div id="app-container" class="hidden-screen">
        <header class="ops-header">
            <div class="header-brand"><img src="logo-192.png" class="nav-logo"><span>TFA :: COMMAND CENTER</span></div>
            <div class="nav-links">
                <button onclick="renderView('dashboard')">DASHBOARD</button>
                <button onclick="renderView('vault')">EVIDENCE</button>
                <button onclick="renderView('cases')">DOSSIERS</button>
            </div>
            <div class="header-status"><span class="status-dot"></span>SECURE LINK ACTIVE</div>
        </header>

        <div class="workspace">
            <main id="view-container">
                </main>

            <aside class="sidebar-right">
                <div class="ai-header">AI ANALYST ONLINE</div>
                <div id="chat-output" class="chat-container">
                    <div class="chat-message ai-message">Analyst ready. Query input required.</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="ai-input" placeholder="Query interface...">
                </div>
            </aside>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
