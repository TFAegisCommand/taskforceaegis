<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Force Aegis | Operations Terminal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Rajdhani:wght@500;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Global Tactical Scanline Overlay -->
    <div class="scanlines"></div>

    <!-- PHASE 1: SPLASH SCREEN -->
    <div id="splash-screen" class="active-screen">
        <div class="splash-content">
            <div class="logo-3d-wrapper">
                <img src="logo-512.png" alt="Aegis Logo" id="spinning-logo">
            </div>
            <h1 class="splash-title">TASK FORCE AEGIS</h1>
            <button id="initiate-btn" class="tactical-btn delayed-fade">INITIATE UPLINK</button>
        </div>
    </div>

    <!-- PHASE 2: MAIN APP TERMINAL -->
    <div id="app-container" class="hidden-screen">
        <header class="ops-header">
            <div class="header-brand">
                <img src="logo-192.png" alt="TFA Icon" class="nav-logo">
                <span class="nav-title">TFA :: COMMAND CENTER</span>
            </div>
            
            <!-- Navigation Links -->
            <div class="nav-links">
                <button onclick="renderView('dashboard')" class="nav-btn">DASHBOARD</button>
                <button onclick="renderView('vault')" class="nav-btn">EVIDENCE VAULT</button>
                <button onclick="renderView('cases')" class="nav-btn">ACTIVE DOSSIERS</button>
            </div>
            
            <div class="header-status">
                <span class="status-dot"></span>
                <span>SECURE LINK ACTIVE</span>
            </div>
        </header>

        <div class="workspace">
            <!-- Dynamic Content Area -->
            <main id="view-container" class="main-content-area">
                <!-- Content injected by script.js -->
            </main>

            <!-- AI Analyst Right Sidebar -->
            <aside class="sidebar-right">
                <div class="ai-header">
                    <span>AI ANALYST ONLINE</span>
                    <div class="pulse-indicator"></div>
                </div>
                <div id="chat-output" class="chat-container">
                    <!-- Typing effect target -->
                    <div class="chat-message ai-message" id="ai-greeting"></div>
                </div>
                <div class="chat-input-area">
                    <span class="prompt-arrow">></span>
                    <input type="text" id="ai-input" placeholder="Query interface..." autocomplete="off">
                </div>
            </aside>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
